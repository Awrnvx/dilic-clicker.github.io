<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dilic Wheel ✦ Колесо Фортуны</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0c15 0%, #121520 50%, #0a0c15 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Главный контейнер */
        .dilic-wheel {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 60px;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            padding: 30px 25px 35px;
            box-shadow: 
                0 25px 40px -15px rgba(0, 0, 0, 0.5),
                0 0 0 0.5px rgba(255, 255, 255, 0.06) inset;
            position: relative;
            overflow: hidden;
        }

        /* Стеклянный эффект */
        .dilic-wheel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
            opacity: 0.5;
            z-index: 0;
        }

        h1 {
            text-align: center;
            font-size: 2.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #aaddff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            margin-bottom: 5px;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            z-index: 1;
        }

        /* ===== КОЛЕСО ===== */
        .wheel-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 10px auto 20px;
            position: relative;
            z-index: 2;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
            box-shadow: 
                0 30px 40px -15px rgba(0, 0, 0, 0.7),
                0 0 0 3px rgba(255, 255, 255, 0.1) inset,
                0 0 0 5px rgba(255, 215, 0, 0.4);
            background: rgba(0, 0, 0, 0.3);
            transition: transform 0.1s linear;
        }

        /* Указатель */
        .pointer-dilic {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-top: 45px solid gold;
            filter: drop-shadow(0 10px 8px #00000099);
            z-index: 10;
        }

        .pointer-dilic::after {
            content: '';
            position: absolute;
            top: -50px;
            left: -12px;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle, #ffd966, #b8860b);
            border-radius: 50%;
            box-shadow: 0 0 30px gold;
        }

        /* ===== ЛЕГЕНДА ===== */
        .prizes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            padding: 15px;
            margin: 20px 0 15px;
            position: relative;
            z-index: 1;
        }

        .prize-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 40px;
            border: 0.5px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }

        .prize-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.02);
            border-color: rgba(255, 215, 0, 0.3);
        }

        .prize-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            box-shadow: 0 0 12px currentColor;
        }

        .prize-text {
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .prize-text strong {
            color: gold;
            font-size: 1rem;
            margin-right: 3px;
        }

        .currency-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            object-fit: cover;
        }

        .skin-info-btn {
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid gold;
            color: gold;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-left: auto;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .skin-info-btn:hover {
            background: gold;
            color: black;
            transform: scale(1.1);
            box-shadow: 0 0 15px gold;
        }

        /* ===== МОДАЛЬНОЕ ОКНО ДЛЯ СКИНА ===== */
        .skin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .skin-modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 450px;
            width: 100%;
            background: rgba(20, 25, 35, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid gold;
            border-radius: 50px;
            padding: 30px 25px;
            text-align: center;
            position: relative;
            animation: modalAppear 0.3s ease;
            box-shadow: 0 30px 50px rgba(0,0,0,0.7);
        }

        @keyframes modalAppear {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2rem;
            color: gold;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .modal-close:hover {
            transform: scale(1.2) rotate(90deg);
        }

        .modal-title {
            color: gold;
            font-size: 2rem;
            margin-bottom: 15px;
            text-shadow: 0 0 20px gold;
        }

        .skin-preview {
            width: 180px;
            height: 180px;
            margin: 15px auto;
            border-radius: 50%;
            border: 4px solid gold;
            overflow: hidden;
            box-shadow: 0 0 50px gold;
        }

        .skin-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .skin-description {
            color: white;
            font-size: 1.2rem;
            margin: 15px 0;
            line-height: 1.5;
        }

        .multiplier-badge {
            display: inline-block;
            background: linear-gradient(145deg, #ffd966, #b8860b);
            padding: 10px 30px;
            border-radius: 40px;
            color: #1a0f00;
            font-weight: bold;
            font-size: 1.3rem;
            margin-top: 10px;
            box-shadow: 0 4px 0 #7a4f00;
        }

        /* ===== КНОПКА ===== */
        .spin-dilic {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 0.5px solid rgba(255, 255, 255, 0.12);
            color: white;
            padding: 18px 0;
            border-radius: 50px;
            font-size: 2.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 5px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: all 0.15s ease;
            margin: 15px 0 20px;
            position: relative;
            z-index: 2;
        }

        .spin-dilic:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .spin-dilic:active {
            transform: scale(0.98) translateY(0);
        }

        .spin-dilic:disabled {
            opacity: 0.5;
            transform: none;
            pointer-events: none;
        }

        /* ===== РЕЗУЛЬТАТ ===== */
        .result-card {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            padding: 20px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .result-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 2.2rem;
            font-weight: 600;
            color: gold;
            text-shadow: 0 0 20px gold;
            line-height: 1.3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .result-skin {
            color: #ffb7c5;
            text-shadow: 0 0 30px #ff69b4;
            font-size: 2rem;
        }

        .result-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Пузырьки */
        .bubble {
            position: fixed;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02));
            border-radius: 50%;
            pointer-events: none;
            animation: bubbleFloat 8s linear forwards;
            z-index: 0;
        }

        @keyframes bubbleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0.2; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }

        /* Адаптация под мобилки */
        @media (max-width: 550px) {
            .wheel-wrapper {
                width: 280px;
                height: 280px;
            }
            
            .prizes-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .spin-dilic {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div id="bubbles-container"></div>

    <!-- Модальное окно для скина -->
    <div class="skin-modal" id="skinModal">
        <div class="modal-content">
            <span class="modal-close" id="closeModal">✕</span>
            <h2 class="modal-title">✦ ОСОБЕННЫЙ СКИН ✦</h2>
            <div class="skin-preview">
                <img src="https://static.wikia.nocookie.net/59310fd4-7c46-4895-930e-6cea7982a142/scale-to-width/755" alt="Special Skin" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4366/4366891.png'">
            </div>
            <p class="skin-description">
                ✨ Легендарный скин дракона<br>

            </p>
            <div class="multiplier-badge">×250</div>
        </div>
    </div>

    <div class="dilic-wheel">
        <h1>✦ FORTUNE WHEEL ✦</h1>
        <div class="subtitle">dilic clicker</div>

        <!-- Колесо -->
        <div class="wheel-wrapper">
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
            <div class="pointer-dilic"></div>
        </div>

        <!-- Легенда призов -->
        <div class="prizes-grid" id="prizesGrid">
            <!-- 50% - money -->
            <div class="prize-item">
                <span class="prize-dot" style="background:#2e7d32;"></span>
                <span class="prize-text">
                    <strong>50%</strong> 2500
                    <img src="https://avatars.mds.yandex.net/i?id=d2747e92b4fb93d8cee0b3582cb46ea6_l-5332707-images-thumbs&n=13" class="currency-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4366/4366891.png'">
                </span>
            </div>
            
            <!-- 35% - money -->
            <div class="prize-item">
                <span class="prize-dot" style="background:#f9a825;"></span>
                <span class="prize-text">
                    <strong>35%</strong> 5500
                    <img src="https://avatars.mds.yandex.net/i?id=d2747e92b4fb93d8cee0b3582cb46ea6_l-5332707-images-thumbs&n=13" class="currency-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4366/4366891.png'">
                </span>
            </div>
            
            <!-- 25% - money -->
            <div class="prize-item">
                <span class="prize-dot" style="background:#ef6c00;"></span>
                <span class="prize-text">
                    <strong>25%</strong> 8500
                    <img src="https://avatars.mds.yandex.net/i?id=d2747e92b4fb93d8cee0b3582cb46ea6_l-5332707-images-thumbs&n=13" class="currency-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4366/4366891.png'">
                </span>
            </div>
            
            <!-- 15% - money -->
            <div class="prize-item">
                <span class="prize-dot" style="background:#d32f2f;"></span>
                <span class="prize-text">
                    <strong>15%</strong> 11500
                    <img src="https://avatars.mds.yandex.net/i?id=d2747e92b4fb93d8cee0b3582cb46ea6_l-5332707-images-thumbs&n=13" class="currency-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4366/4366891.png'">
                </span>
            </div>
            
            <!-- 5% - dilicks -->
            <div class="prize-item">
                <span class="prize-dot" style="background:#7b1fa2;"></span>
                <span class="prize-text">
                    <strong>5%</strong> 5000
                    <img src="https://i.pinimg.com/736x/df/49/fd/df49fd562d564016dcc4070b5e83c521.jpg" class="currency-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4366/4366891.png'">
                </span>
            </div>
            
            <!-- 2.5% - skin с кнопкой ? -->
            <div class="prize-item">
                <span class="prize-dot" style="background:#c2185b;"></span>
                <span class="prize-text">
                    <strong>2.5%</strong> СКИН
                    <span style="margin-left: 5px;">✨</span>
                </span>
                <div class="skin-info-btn" id="showSkinBtn">?</div>
            </div>
        </div>

        <!-- Кнопка -->
        <button class="spin-dilic" id="spinButton">🎲 КРУТИТЬ</button>

        <!-- Результат -->
        <div class="result-card" id="resultCard">
            <div class="result-label">ТВОЙ ВЫИГРЫШ</div>
            <div class="result-value" id="resultDisplay">
                <span>НАЖМИ SPIN</span>
            </div>
            <div id="skinMultiplier" style="display: none;" class="multiplier-badge">×250 МНОЖИТЕЛЬ</div>
        </div>
    </div>

    <script>
        (function() {
            // ===== ИКОНКИ ВАЛЮТ =====
            const MONEY_ICON = 'https://avatars.mds.yandex.net/i?id=d2747e92b4fb93d8cee0b3582cb46ea6_l-5332707-images-thumbs&n=13';
            const DILICKS_ICON = 'https://i.pinimg.com/736x/df/49/fd/df49fd562d564016dcc4070b5e83c521.jpg';
            
            // ===== ПРИЗЫ =====
            const PRIZES = [
                { name: '2500 МОНЕТ', value: 2500, type: 'money', prob: 50, color: '#2e7d32', icon: MONEY_ICON },
                { name: '5500 МОНЕТ', value: 5500, type: 'money', prob: 35, color: '#f9a825', icon: MONEY_ICON },
                { name: '8500 МОНЕТ', value: 8500, type: 'money', prob: 25, color: '#ef6c00', icon: MONEY_ICON },
                { name: '11500 МОНЕТ', value: 11500, type: 'money', prob: 15, color: '#d32f2f', icon: MONEY_ICON },
                { name: '5000 ДИЛИКОВ', value: 5000, type: 'dilicks', prob: 5, color: '#7b1fa2', icon: DILICKS_ICON },
                { name: 'ОСОБЕННЫЙ СКИН', value: 'skin', type: 'skin', prob: 2.5, color: '#c2185b', icon: '✨' }
            ];

            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const spinBtn = document.getElementById('spinButton');
            const resultDisplay = document.getElementById('resultDisplay');
            const skinMultiplier = document.getElementById('skinMultiplier');
            const bubblesContainer = document.getElementById('bubbles-container');
            const skinModal = document.getElementById('skinModal');
            const closeModal = document.getElementById('closeModal');
            const showSkinBtn = document.getElementById('showSkinBtn');

            let isSpinning = false;
            let rotation = 0;
            let spinVelocity = 0;
            let spinDeceleration = 0.985;
            let spinActive = false;
            let animationFrame = null;

            // ===== МОДАЛКА ДЛЯ СКИНА =====
            showSkinBtn.addEventListener('click', () => {
                skinModal.classList.add('active');
            });

            closeModal.addEventListener('click', () => {
                skinModal.classList.remove('active');
            });

            window.addEventListener('click', (e) => {
                if (e.target === skinModal) {
                    skinModal.classList.remove('active');
                }
            });

            // ===== ПУЗЫРЬКИ =====
            function createBubble() {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 40 + 15;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.bottom = '-50px';
                bubble.style.animationDuration = (Math.random() * 5 + 4) + 's';
                bubblesContainer.appendChild(bubble);
                
                setTimeout(() => {
                    if (bubble.parentNode) bubble.remove();
                }, 9000);
            }

            setInterval(createBubble, 2000);

            // ===== РИСОВАНИЕ КОЛЕСА (БЕЗ ЭМОДЗИ) =====
            function drawWheel(rotateRad = 0) {
                const w = canvas.width;
                const h = canvas.height;
                const cx = w / 2;
                const cy = h / 2;
                const r = Math.min(w, h) * 0.4;

                ctx.clearRect(0, 0, w, h);

                let startAngle = rotateRad - Math.PI / 2;

                for (let i = 0; i < PRIZES.length; i++) {
                    const prize = PRIZES[i];
                    const sliceAngle = (prize.prob / 100) * 2 * Math.PI;
                    const endAngle = startAngle + sliceAngle;

                    // Сегмент
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.arc(cx, cy, r, startAngle, endAngle);
                    ctx.closePath();

                    ctx.fillStyle = prize.color;
                    ctx.shadowColor = 'rgba(255,255,255,0.3)';
                    ctx.shadowBlur = 15;
                    ctx.fill();

                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    startAngle = endAngle;
                }

                // Центр
                ctx.beginPath();
                ctx.arc(cx, cy, r * 0.15, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.shadowColor = 'rgba(255,215,0,0.5)';
                ctx.shadowBlur = 20;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // ===== ВРАЩЕНИЕ =====
            function spinAnimation() {
                if (!spinActive) return;

                rotation += spinVelocity;
                spinVelocity *= spinDeceleration;
                drawWheel(rotation);

                if (spinVelocity < 0.002) {
                    spinActive = false;
                    isSpinning = false;
                    spinBtn.disabled = false;

                    // Определяем результат
                    const normalized = ((rotation % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
                    let angle = (normalized + Math.PI/2) % (2*Math.PI);
                    
                    let cumulative = 0;
                    let selectedPrize = PRIZES[0];
                    
                    for (let prize of PRIZES) {
                        const slice = (prize.prob / 100) * 2 * Math.PI;
                        if (angle >= cumulative && angle < cumulative + slice) {
                            selectedPrize = prize;
                            break;
                        }
                        cumulative += slice;
                    }

                    // Показываем результат
                    if (selectedPrize.type === 'skin') {
                        resultDisplay.innerHTML = `
                            <span>✨</span>
                            <span>ОСОБЕННЫЙ СКИН</span>
                            <span>✨</span>
                        `;
                        resultDisplay.className = 'result-value result-skin';
                        skinMultiplier.style.display = 'inline-block';
                    } else {
                        const icon = selectedPrize.type === 'money' ? MONEY_ICON : DILICKS_ICON;
                        resultDisplay.innerHTML = `
                            <img src="${icon}" class="result-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4366/4366891.png'">
                            <span>${selectedPrize.value.toLocaleString()}</span>
                            <img src="${icon}" class="result-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4366/4366891.png'">
                        `;
                        resultDisplay.className = 'result-value';
                        skinMultiplier.style.display = 'none';
                    }

                    if (navigator.vibrate) navigator.vibrate(100);
                    return;
                }

                animationFrame = requestAnimationFrame(spinAnimation);
            }

            // ===== СТАРТ =====
            function startSpin() {
                if (isSpinning) return;

                spinVelocity = 0.45 + Math.random() * 0.3;
                spinDeceleration = 0.982 + (Math.random() * 0.01);
                spinActive = true;
                isSpinning = true;
                spinBtn.disabled = true;
                
                resultDisplay.innerHTML = '<span>⏳ КРУТИТСЯ...</span>';
                resultDisplay.className = 'result-value';
                skinMultiplier.style.display = 'none';

                if (animationFrame) cancelAnimationFrame(animationFrame);
                animationFrame = requestAnimationFrame(spinAnimation);

                if (navigator.vibrate) navigator.vibrate(30);
            }

            drawWheel(rotation);
            spinBtn.addEventListener('click', startSpin);
        })();
    </script>
</body>
